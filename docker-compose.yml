services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - sqlite_data:/app/db
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-True}
      - DJANGO_ALLOWED_HOSTS=localhost 127.0.0.1 backend
      - CORS_ALLOWED_ORIGINS=http://localhost http://localhost:80
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py makemigrations accounts &&
             python manage.py makemigrations dialogues &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
